<div class="grid gap-1" [formGroup]="parentGroup()">
  <app-dynamic-skeleton [showSkeleton]="isLoading()">
    <label [for]="id()">{{ label() }}</label>
  </app-dynamic-skeleton>
  <app-dynamic-skeleton [showSkeleton]="isLoading()">
    <p-password
      [feedback]="feedback()"
      [toggleMask]="true"
      [id]="id()"
      [formControlName]="controlName()"
      [inputStyleClass]="fieldClasses()"
    />
  </app-dynamic-skeleton>
  <app-validation-feedback
    [parentGroup]="parentGroup()"
    [controlName]="controlName()"
    [class.hidden]="isLoading()"
  />
</div>
