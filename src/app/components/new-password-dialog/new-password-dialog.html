<app-dialog
  [(dialogVisible)]="dialogVisible"
  dialogTitle="New password"
  i18n-dialogTitle="@@newPasswordDialog.dialogTitle"
  (shown)="setPassword()"
>
  <div>
    <app-password-input
      id="newPassword"
      label="New password"
      i18n-label="@@newPasswordDialog.newPasswordLabel"
      controlName="newPasswordControl"
      [parentGroup]="parentGroup"
      [disabled]="true"
      [fluid]="true"
    />
  </div>
</app-dialog>
